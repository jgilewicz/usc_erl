# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  ALGO: erl
  ENV: HalfCheetah-v5
  MODE: dropout

tasks:
  default:
    desc: "List available tasks"
    cmds:
      - task --list
    silent: true

  run:
    desc: "Run algorithm (default: erl, e.g. task run ALGO=td3)"
    cmds:
      - uv run python entry_point.py algorithm={{.ALGO}} {{.CLI_ARGS}}

  run-parallel-mujoco:
    desc: "Run all 10 algorithms across all 5 MuJoCo environments (all 5 seeds) in parallel"
    vars:
      PARALLEL: '{{default "4" .PARALLEL}}'
    cmds:
      - |
        set -euo pipefail
        ENVS=("HalfCheetah-v5" "Hopper-v5" "Walker2d-v5" "Ant-v5" "Swimmer-v5")
        ALGOS=(
          "sc_erl:dropout"
          "sc_erl:ensemble"
          "sc_erl:evidential"
          "sc_erl:random"
          "td3:"
          "erl:"
          "ddpg:"
          "ppo:"
          "sac:"
          "crossq:"
        )
        SEEDS=(0 1 2 3 4)
        mkdir -p logs

        generate_commands() {
          for ENV in "${ENVS[@]}"; do
            for ALGO_MODE in "${ALGOS[@]}"; do
              ALGO="${ALGO_MODE%%:*}"
              MODE="${ALGO_MODE##*:}"
              for SEED in "${SEEDS[@]}"; do
                if [[ -n "$MODE" ]]; then
                  RUN_NAME="${ALGO}_${MODE}_${ENV}_seed${SEED}"
                  TAGS="[MuJoCo,${ALGO},${MODE}]"
                  SURROGATE_ARG="surrogate.mode=${MODE}"
                else
                  RUN_NAME="${ALGO}_${ENV}_seed${SEED}"
                  TAGS="[MuJoCo,${ALGO},baseline]"
                  SURROGATE_ARG=""
                fi
                echo "uv run python entry_point.py \
                  algorithm=${ALGO} \
                  ${SURROGATE_ARG} \
                  seed=${SEED} \
                  env.id=${ENV} \
                  eval_env.id=${ENV} \
                  n_steps=1000000 \
                  wandb.enabled=true \
                  'wandb.name=${RUN_NAME}' \
                  'wandb.tags=${TAGS}' \
                  'hydra.run.dir=outputs/${RUN_NAME}'"
              done
            done
          done
        }

        generate_commands | shuf | xargs -P {{.PARALLEL}} -I CMD bash -c 'CMD >> logs/run_$$.out 2>&1'


  run-parallel-dmc:
    desc: "Run all 10 algorithms across all 5 DMC dog tasks (all 5 seeds) in parallel"
    vars:
      PARALLEL: '{{default "4" .PARALLEL}}'
    cmds:
      - |
        set -euo pipefail
        ENVS=(
          "dm_control/dog-stand-v0"
          "dm_control/dog-walk-v0"
          "dm_control/dog-trot-v0"
          "dm_control/dog-run-v0"
          "dm_control/dog-fetch-v0"
        )
        ALGOS=(
          "sc_erl:dropout"
          "sc_erl:ensemble"
          "sc_erl:evidential"
          "sc_erl:random"
          "td3:"
          "erl:"
          "ddpg:"
          "ppo:"
          "sac:"
          "crossq:"
        )
        SEEDS=(0 1 2 3 4)
        mkdir -p logs

        generate_commands() {
          for ENV in "${ENVS[@]}"; do
            SLUG=$(echo "${ENV}" | tr '/' '_' | tr ':' '_')
            for ALGO_MODE in "${ALGOS[@]}"; do
              ALGO="${ALGO_MODE%%:*}"
              MODE="${ALGO_MODE##*:}"
              for SEED in "${SEEDS[@]}"; do
                if [[ -n "$MODE" ]]; then
                  RUN_NAME="${ALGO}_${MODE}_${SLUG}_seed${SEED}"
                  TAGS="[DMC,${ALGO},${MODE}]"
                  SURROGATE_ARG="surrogate.mode=${MODE}"
                else
                  RUN_NAME="${ALGO}_${SLUG}_seed${SEED}"
                  TAGS="[DMC,${ALGO},baseline]"
                  SURROGATE_ARG=""
                fi
                echo "uv run python entry_point.py \
                  algorithm=${ALGO} \
                  ${SURROGATE_ARG} \
                  seed=${SEED} \
                  env.id=${ENV} \
                  eval_env.id=${ENV} \
                  env.backend=fancy_gym \
                  eval_env.backend=fancy_gym \
                  n_steps=1000000 \
                  wandb.enabled=true \
                  'wandb.name=${RUN_NAME}' \
                  'wandb.tags=${TAGS}' \
                  'hydra.run.dir=outputs/${RUN_NAME}'"
              done
            done
          done
        }

        generate_commands | shuf | xargs -P {{.PARALLEL}} -I CMD bash -c 'CMD >> logs/run_$$.out 2>&1'
 
  clean:
    desc: "Clean outputs, Hydra logs, training results, downloaded metrics, and compiled reports"
    cmds:
      - rm -rf outputs .hydra results wandb logs *.pdf
      - |
        for folder in eval_reward rl_reward best_population_fitness avg_population_fitness \
                      uncertainty_mean uncertainty_max uncertainty_threshold \
                      critic_loss total_steps generation summary \
                      raw_sigma_mean raw_sigma_max results_output surrogate_ratio; do
          rm -rf plots_and_tests/$folder
        done

  report:
    desc: "Generate all plots, statistical tables, Markdown and PDF reports (full pipeline)"
    cmds:
      - uv run python plots_and_tests/download_results.py && run python plots_and_tests/generate_results.py
