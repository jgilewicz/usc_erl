# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  ALGO: erl

tasks:
  default:
    desc: "List available tasks"
    cmds:
      - task --list
    silent: true

  run:
    desc: "Run algorithm (default: erl, e.g. task run ALGO=td3)"
    cmds:
      - uv run python entry_point.py algorithm={{.ALGO}} {{.CLI_ARGS}}

  tune:
    desc: "Tune hyperparameters using Optuna sequentially across all MuJoCo environments (default: erl, e.g. task tune ALGO=ppo)"
    cmds:
      - |
        for env in HalfCheetah-v4 Hopper-v4 Walker2d-v4 Ant-v4 Swimmer-v4; do
          echo "=== Tuning {{.ALGO}} on ${env} ==="
          uv run python src/optimization/optuna_tune.py algorithm={{.ALGO}} env.id=${env} eval_env.id=${env} {{.CLI_ARGS}}
        done

  tune-all:
    desc: "Tune hyperparameters across ALL 5 algorithms and ALL 5 MuJoCo environments sequentially (supports custom overrides, e.g. task tune-all CLI_ARGS=\"n_steps=10000\")"
    cmds:
      - uv run python src/optimization/run_optuna_grid.py {{.CLI_ARGS}}

  run-mujoco-parallel:
    desc: "Runs the full MuJoCo experiment matrix locally in parallel"
    cmds:
      - |
        for env in HalfCheetah-v4 Hopper-v4 Walker2d-v4 Ant-v4 Swimmer-v4; do
          for seed in 0 1 2 3 4; do
            echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=dropout seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_dropout_${env}_seed${seed}\" wandb.tags=\"[MuJoCo,sc_erl,dropout]\""
            echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=ensemble seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_ensemble_${env}_seed${seed}\" wandb.tags=\"[MuJoCo,sc_erl,ensemble]\""
            echo "uv run python entry_point.py algorithm=td3 seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"td3_${env}_seed${seed}\" wandb.tags=\"[MuJoCo,td3,baseline]\""
            echo "uv run python entry_point.py algorithm=erl seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"erl_${env}_seed${seed}\" wandb.tags=\"[MuJoCo,erl,baseline]\""
            echo "uv run python entry_point.py algorithm=ppo seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"ppo_${env}_seed${seed}\" wandb.tags=\"[MuJoCo,ppo,baseline]\""
            echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=random seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_random_${env}_seed${seed}\" wandb.tags=\"[MuJoCo,sc_erl,random]\""
            echo "uv run python entry_point.py algorithm=ddpg seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"ddpg_${env}_seed${seed}\" wandb.tags=\"[MuJoCo,ddpg,baseline]\""
          done
        done | perl -MList::Util=shuffle -e 'print shuffle <STDIN>' | xargs -I {} -P 24 bash -c '{}'


  smoke-test:
    desc: "Run a quick smoke test for all algorithms on Ant-v5 with seed 42"
    cmds:
      - |
        echo "=== Running PPO smoke test ==="
        uv run python entry_point.py algorithm=ppo env.id=Ant-v5 eval_env.id=Ant-v5 seed=42 n_steps=20000 wandb.enabled=false
      - |
        echo "=== Running TD3 smoke test ==="
        uv run python entry_point.py algorithm=td3 env.id=Ant-v5 eval_env.id=Ant-v5 seed=42 n_steps=20000 wandb.enabled=false
      - |
        echo "=== Running DDPG smoke test ==="
        uv run python entry_point.py algorithm=ddpg env.id=Ant-v5 eval_env.id=Ant-v5 seed=42 n_steps=20000 wandb.enabled=false
      - |
        echo "=== Running ERL smoke test ==="
        uv run python entry_point.py algorithm=erl env.id=Ant-v5 eval_env.id=Ant-v5 seed=42 n_steps=20000 evolution.population_size=4 warmup.warmup_steps=1000 buffer_size=20000 wandb.enabled=false
      - |
        echo "=== Running SC-ERL Random smoke test ==="
        uv run python entry_point.py algorithm=sc_erl surrogate.mode=random env.id=Ant-v5 eval_env.id=Ant-v5 seed=42 n_steps=20000 evolution.population_size=4 warmup.warmup_steps=1000 buffer_size=20000 wandb.enabled=false
      - |
        echo "=== Running SC-ERL Dropout smoke test ==="
        uv run python entry_point.py algorithm=sc_erl surrogate.mode=dropout env.id=Ant-v5 eval_env.id=Ant-v5 seed=42 n_steps=20000 evolution.population_size=4 warmup.warmup_steps=1000 buffer_size=20000 wandb.enabled=false
      - |
        echo "=== Running SC-ERL Ensemble smoke test ==="
        uv run python entry_point.py algorithm=sc_erl surrogate.mode=ensemble env.id=Ant-v5 eval_env.id=Ant-v5 seed=42 n_steps=20000 evolution.population_size=4 warmup.warmup_steps=1000 buffer_size=20000 wandb.enabled=false
      - |
        echo "=== Running SC-ERL Evidential smoke test ==="
        uv run python entry_point.py algorithm=sc_erl surrogate.mode=evidential env.id=Ant-v5 eval_env.id=Ant-v5 seed=42 n_steps=20000 evolution.population_size=4 warmup.warmup_steps=1000 buffer_size=20000 wandb.enabled=false



  clean:
    desc: "Clean outputs, Hydra logs, training results, downloaded metrics, and compiled reports"
    cmds:
      - rm -rf outputs .hydra results wandb *.pdf 
      - |
        for folder in eval_reward rl_reward best_population_fitness avg_population_fitness uncertainty_mean uncertainty_max uncertainty_threshold critic_loss total_steps generation summary; do
          rm -rf plots_and_tests/$folder
        done

  report:
    desc: "Generate all plots, statistical tables, Markdown and PDF reports (full pipeline)"
    cmds:
      - uv run python plots_and_tests/process_results.py
      - uv run python plots_and_tests/statistical_tests.py
      - uv run python plots_and_tests/generate_report.py
      - uv run python plots_and_tests/generate_pdf.py

