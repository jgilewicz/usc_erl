# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  ALGO: erl

tasks:
  default:
    desc: "List available tasks"
    cmds:
      - task --list
    silent: true

  run:
    desc: "Run algorithm (default: erl, e.g. task run ALGO=td3)"
    cmds:
      - uv run python entry_point.py algorithm={{.ALGO}} {{.CLI_ARGS}}

  run-mujoco-parallel:
    desc: "Runs the full MuJoCo fallback experiment matrix locally in parallel"
    cmds:
      - |
        for env in HalfCheetah-v5 Hopper-v5 Walker2d-v5 Ant-v5 Swimmer-v5; do
          for seed in 0 1 2 3 4; do
            echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=dropout seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_dropout_${env}_seed${seed}\" wandb.tags=\"[MuJoCo,sc_erl,dropout]\""
            echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=ensemble seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_ensemble_${env}_seed${seed}\" wandb.tags=\"[MuJoCo,sc_erl,ensemble]\""
            echo "uv run python entry_point.py algorithm=td3 seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"td3_${env}_seed${seed}\" wandb.tags=\"[MuJoCo,td3,baseline]\""
            echo "uv run python entry_point.py algorithm=erl seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"erl_${env}_seed${seed}\" wandb.tags=\"[MuJoCo,erl,baseline]\""
            echo "uv run python entry_point.py algorithm=ppo seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"ppo_${env}_seed${seed}\" wandb.tags=\"[MuJoCo,ppo,baseline]\""
            echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=random seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_random_${env}_seed${seed}\" wandb.tags=\"[MuJoCo,sc_erl,random]\""
            echo "uv run python entry_point.py algorithm=ddpg seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"ddpg_${env}_seed${seed}\" wandb.tags=\"[MuJoCo,ddpg,baseline]\""
          done
        done | shuf | xargs -I {} -P 24 bash -c '{}'

  run-mujoco-parallel-evo:
    desc: "Runs only the evolutionary algorithms (ERL, SC-ERL dropout/ensemble/random) on MuJoCo in parallel"
    cmds:
      - |
        for env in HalfCheetah-v5 Hopper-v5 Walker2d-v5 Ant-v5 Swimmer-v5; do
          for seed in 0 1 2 3 4; do
            echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=dropout seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_dropout_${env}_seed${seed}\" wandb.tags=\"[MuJoCo,sc_erl,dropout]\""
            echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=ensemble seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_ensemble_${env}_seed${seed}\" wandb.tags=\"[MuJoCo,sc_erl,ensemble]\""
            echo "uv run python entry_point.py algorithm=erl seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"erl_${env}_seed${seed}\" wandb.tags=\"[MuJoCo,erl,baseline]\""
            echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=random seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_random_${env}_seed${seed}\" wandb.tags=\"[MuJoCo,sc_erl,random]\""
          done
        done | shuf | xargs -I {} -P 24 bash -c '{}'

  run-machine-1:
    desc: "Maszyna 1: Wszystkie algorytmy oprócz TD3 i PPO dla Hopper-v5 (25 zadań)"
    cmds:
      - uv sync
      - |
        # Czyszczenie starego pliku przed generowaniem zadań
        rm -f /tmp/m1_jobs.txt

        for seed in 0 1 2 3 4; do
          for algo in erl ddpg; do
            echo "uv run python entry_point.py algorithm=$algo seed=$seed env.id=Hopper-v5 eval_env.id=Hopper-v5 n_steps=1000000 wandb.enabled=true wandb.name=\"${algo}_Hopper-v5_seed${seed}\" wandb.tags=\"[Maszyna1,MuJoCo,$algo]\"" >> /tmp/m1_jobs.txt
          done
          echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=dropout seed=$seed env.id=Hopper-v5 eval_env.id=Hopper-v5 n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_dropout_Hopper-v5_seed${seed}\" wandb.tags=\"[Maszyna1,MuJoCo,sc_erl,dropout]\"" >> /tmp/m1_jobs.txt
          echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=ensemble seed=$seed env.id=Hopper-v5 eval_env.id=Hopper-v5 n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_ensemble_Hopper-v5_seed${seed}\" wandb.tags=\"[Maszyna1,MuJoCo,sc_erl,ensemble]\"" >> /tmp/m1_jobs.txt
          echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=random seed=$seed env.id=Hopper-v5 eval_env.id=Hopper-v5 n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_random_Hopper-v5_seed${seed}\" wandb.tags=\"[Maszyna1,MuJoCo,sc_erl,random]\"" >> /tmp/m1_jobs.txt
        done

        # Uruchomienie (dostosuj -P pod liczbę rdzeni CPU maszyny 1)
        cat /tmp/m1_jobs.txt | shuf | xargs -I {} -P 4 bash -c '{}'
        rm -f /tmp/m1_jobs.txt

  run-machine-2:
    desc: "Maszyna 2: MacBook M4 16GB (Wszystkie oprócz TD3 i PPO dla Swimmer-v5, 25 zadań)"
    cmds:
      - uv sync
      - |
        # Czyszczenie starego pliku przed generowaniem zadań
        rm -f /tmp/m2_jobs.txt

        for seed in 0 1 2 3 4; do
          for algo in erl ddpg; do
            echo "uv run python entry_point.py algorithm=$algo seed=$seed env.id=Swimmer-v5 eval_env.id=Swimmer-v5 n_steps=1000000 wandb.enabled=true wandb.name=\"${algo}_Swimmer-v5_seed${seed}\" wandb.tags=\"[Maszyna2,MuJoCo,$algo]\"" >> /tmp/m2_jobs.txt
          done
          echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=dropout seed=$seed env.id=Swimmer-v5 eval_env.id=Swimmer-v5 n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_dropout_Swimmer-v5_seed${seed}\" wandb.tags=\"[Maszyna2,MuJoCo,sc_erl,dropout]\"" >> /tmp/m2_jobs.txt
          echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=ensemble seed=$seed env.id=Swimmer-v5 eval_env.id=Swimmer-v5 n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_ensemble_Swimmer-v5_seed${seed}\" wandb.tags=\"[Maszyna2,MuJoCo,sc_erl,ensemble]\"" >> /tmp/m2_jobs.txt
          echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=random seed=$seed env.id=Swimmer-v5 eval_env.id=Swimmer-v5 n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_random_Swimmer-v5_seed${seed}\" wandb.tags=\"[Maszyna2,MuJoCo,sc_erl,random]\"" >> /tmp/m2_jobs.txt
        done

        # Uruchomienie (MacBook M4 16GB Unified RAM - zrównoważone -P 2 dla stabilnego MPS bez przegrzewania i swapu)
        cat /tmp/m2_jobs.txt | shuf | xargs -I {} -P 2 bash -c '{}'
        rm -f /tmp/m2_jobs.txt

  run-machine-vastai:
    desc: "Dla Vast.ai (EPYC 24+ vCPU / RTX 3090): Wszystkie algorytmy oprócz TD3 i PPO dla HalfCheetah-v5 (25 zadań)"
    cmds:
      - uv sync
      - |
        # Czyszczenie starego pliku przed generowaniem zadań
        rm -f /tmp/vast_jobs.txt

        for seed in 0 1 2 3 4; do
          for algo in erl ddpg; do
            echo "uv run python entry_point.py algorithm=$algo seed=$seed env.id=HalfCheetah-v5 eval_env.id=HalfCheetah-v5 n_steps=1000000 wandb.enabled=true wandb.name=\"${algo}_HalfCheetah-v5_seed${seed}\" wandb.tags=\"[VastAI,MuJoCo,$algo]\"" >> /tmp/vast_jobs.txt
          done
          echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=dropout seed=$seed env.id=HalfCheetah-v5 eval_env.id=HalfCheetah-v5 n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_dropout_HalfCheetah-v5_seed${seed}\" wandb.tags=\"[VastAI,MuJoCo,sc_erl,dropout]\"" >> /tmp/vast_jobs.txt
          echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=ensemble seed=$seed env.id=HalfCheetah-v5 eval_env.id=HalfCheetah-v5 n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_ensemble_HalfCheetah-v5_seed${seed}\" wandb.tags=\"[VastAI,MuJoCo,sc_erl,ensemble]\"" >> /tmp/vast_jobs.txt
          echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=random seed=$seed env.id=HalfCheetah-v5 eval_env.id=HalfCheetah-v5 n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_random_HalfCheetah-v5_seed${seed}\" wandb.tags=\"[VastAI,MuJoCo,sc_erl,random]\"" >> /tmp/vast_jobs.txt
        done

        # Uruchomienie (EPYC 24+ vCPU / 50+ GB RAM - optymalne -P 12)
        cat /tmp/vast_jobs.txt | shuf | xargs -I {} -P 12 bash -c '{}'
        rm -f /tmp/vast_jobs.txt

  run-remaining-heavy-envs:
    desc: "Uruchomienie dla pozostałych 2 najcięższych środowisk (Ant-v5 i Walker2d-v5) dla 5 algorytmów (50 zadań)"
    cmds:
      - uv sync
      - |
        # Czyszczenie starego pliku przed generowaniem zadań
        rm -f /tmp/heavy_jobs.txt

        for env in Ant-v5 Walker2d-v5; do
          for seed in 0 1 2 3 4; do
            for algo in erl ddpg; do
              echo "uv run python entry_point.py algorithm=$algo seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"${algo}_${env}_seed${seed}\" wandb.tags=\"[HeavyEnv,MuJoCo,$algo]\"" >> /tmp/heavy_jobs.txt
            done
            echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=dropout seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_dropout_${env}_seed${seed}\" wandb.tags=\"[HeavyEnv,MuJoCo,sc_erl,dropout]\"" >> /tmp/heavy_jobs.txt
            echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=ensemble seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_ensemble_${env}_seed${seed}\" wandb.tags=\"[HeavyEnv,MuJoCo,sc_erl,ensemble]\"" >> /tmp/heavy_jobs.txt
            echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=random seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_random_${env}_seed${seed}\" wandb.tags=\"[HeavyEnv,MuJoCo,sc_erl,random]\"" >> /tmp/heavy_jobs.txt
          done
        done

        # Uruchomienie (zoptymalizowane pod 25.6 vCPUs -P 12 dla serwera / Vast.ai)
        cat /tmp/heavy_jobs.txt | shuf | xargs -I {} -P 12 bash -c '{}'
        rm -f /tmp/heavy_jobs.txt


  clean:
    desc: "Clean outputs and Hydra logs"
    cmds:
      - rm -rf outputs .hydra

  report:
    desc: "Generate all plots, statistical tables, Markdown and PDF reports (full pipeline)"
    cmds:
      - uv run python plots_and_tests/process_results.py
      - uv run python plots_and_tests/statistical_tests.py
      - uv run python plots_and_tests/generate_report.py
      - uv run python plots_and_tests/generate_pdf.py

