# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  ALGO: erl

tasks:
  default:
    desc: "List available tasks"
    cmds:
      - task --list
    silent: true

  run:
    desc: "Run algorithm (default: erl, e.g. task run ALGO=td3)"
    cmds:
      - uv run python entry_point.py algorithm={{.ALGO}} {{.CLI_ARGS}}

  run-metaworld-matrix:
    desc: "Runs the full experiment matrix for Metaworld robots (4 environments x 5 seeds x algorithms)"
    cmds:
      - |
        for env in button-press-v2 door-open-v2 drawer-close-v2 window-open-v2 hammer-v2; do
          for seed in 0 1 2 3 4; do
            echo "=== Running: ENVIRONMENT=$env | SEED=$seed ==="
            uv run python entry_point.py algorithm=sc_erl surrogate.mode=dropout seed=$seed env.id=$env eval_env.id=$env n_steps=2000000 wandb.enabled=true wandb.name="sc_erl_dropout_${env}_seed${seed}" wandb.tags="[Metaworld,sc_erl,dropout]"
            uv run python entry_point.py algorithm=sc_erl surrogate.mode=ensemble seed=$seed env.id=$env eval_env.id=$env n_steps=2000000 wandb.enabled=true wandb.name="sc_erl_ensemble_${env}_seed${seed}" wandb.tags="[Metaworld,sc_erl,ensemble]"
            uv run python entry_point.py algorithm=td3 seed=$seed env.id=$env eval_env.id=$env n_steps=2000000 wandb.enabled=true wandb.name="td3_${env}_seed${seed}" wandb.tags="[Metaworld,td3,baseline]"
            uv run python entry_point.py algorithm=erl seed=$seed env.id=$env eval_env.id=$env n_steps=2000000 wandb.enabled=true wandb.name="erl_${env}_seed${seed}" wandb.tags="[Metaworld,erl,baseline]"
            uv run python entry_point.py algorithm=ppo seed=$seed env.id=$env eval_env.id=$env n_steps=2000000 wandb.enabled=true wandb.name="ppo_${env}_seed${seed}" wandb.tags="[Metaworld,ppo,baseline]"
            uv run python entry_point.py algorithm=sc_erl surrogate.mode=random seed=$seed env.id=$env eval_env.id=$env n_steps=2000000 wandb.enabled=true wandb.name="sc_erl_random_${env}_seed${seed}" wandb.tags="[Metaworld,sc_erl,random]"
          done
        done

  run-metaworld-parallel:
    desc: "Runs the experiment matrix in parallel (Warning: uses more CPU/VRAM)"
    cmds:
      - |
        for env in button-press-v2 door-open-v2 drawer-close-v2 window-open-v2 hammer-v2; do
          for seed in 0 1 2 3 4; do
            echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=dropout seed=$seed env.id=$env eval_env.id=$env n_steps=2000000 wandb.enabled=true wandb.name=\"sc_erl_dropout_${env}_seed${seed}\" wandb.tags=\"[Metaworld,sc_erl,dropout]\""
            echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=ensemble seed=$seed env.id=$env eval_env.id=$env n_steps=2000000 wandb.enabled=true wandb.name=\"sc_erl_ensemble_${env}_seed${seed}\" wandb.tags=\"[Metaworld,sc_erl,ensemble]\""
            echo "uv run python entry_point.py algorithm=td3 seed=$seed env.id=$env eval_env.id=$env n_steps=2000000 wandb.enabled=true wandb.name=\"td3_${env}_seed${seed}\" wandb.tags=\"[Metaworld,td3,baseline]\""
            echo "uv run python entry_point.py algorithm=erl seed=$seed env.id=$env eval_env.id=$env n_steps=2000000 wandb.enabled=true wandb.name=\"erl_${env}_seed${seed}\" wandb.tags=\"[Metaworld,erl,baseline]\""
            echo "uv run python entry_point.py algorithm=ppo seed=$seed env.id=$env eval_env.id=$env n_steps=2000000 wandb.enabled=true wandb.name=\"ppo_${env}_seed${seed}\" wandb.tags=\"[Metaworld,ppo,baseline]\""
            echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=random seed=$seed env.id=$env eval_env.id=$env n_steps=2000000 wandb.enabled=true wandb.name=\"sc_erl_random_${env}_seed${seed}\" wandb.tags=\"[Metaworld,sc_erl,random]\""
          done
        done | shuf | xargs -I {} -P 4 bash -c '{}'

  clean:
    desc: "Clean outputs and Hydra logs"
    cmds:
      - rm -rf outputs .hydra
