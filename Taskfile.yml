# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  ALGO: erl

tasks:
  default:
    desc: "List available tasks"
    cmds:
      - task --list
    silent: true

  run:
    desc: "Run algorithm (default: erl, e.g. task run ALGO=td3)"
    cmds:
      - uv run python entry_point.py algorithm={{.ALGO}} {{.CLI_ARGS}}

  tune:
    desc: "Tune hyperparameters using Optuna sequentially across all MuJoCo environments (default: erl, e.g. task tune ALGO=ppo)"
    cmds:
      - |
        for env in HalfCheetah-v5 Hopper-v5 Walker2d-v5 Ant-v5 Swimmer-v5; do
          echo "=== Tuning {{.ALGO}} on ${env} ==="
          uv run python src/optimization/optuna_tune.py algorithm={{.ALGO}} env.id=${env} eval_env.id=${env} {{.CLI_ARGS}}
        done

  tune-all:
    desc: "Tune hyperparameters across ALL 5 algorithms and ALL 5 MuJoCo environments sequentially (supports custom overrides, e.g. task tune-all CLI_ARGS=\"n_steps=10000\")"
    cmds:
      - uv run python src/optimization/run_optuna_grid.py {{.CLI_ARGS}}

  run-mujoco-parallel:
    desc: "Runs the full MuJoCo experiment matrix locally in parallel"
    cmds:
      - |
        for env in HalfCheetah-v5 Hopper-v5 Walker2d-v5 Ant-v5 Swimmer-v5; do

  clean:
    desc: "Clean outputs, Hydra logs, training results, downloaded metrics, and compiled reports"
    cmds:
      - rm -rf outputs .hydra results wandb *.pdf 
      - |
        for folder in eval_reward rl_reward best_population_fitness avg_population_fitness uncertainty_mean uncertainty_max uncertainty_threshold critic_loss total_steps generation summary; do
          rm -rf plots_and_tests/$folder
        done

  report:
    desc: "Generate all plots, statistical tables, Markdown and PDF reports (full pipeline)"
    cmds:
      - uv run python plots_and_tests/generate_results.py


  # ===========================================================================
  # Laptop Pilot Run (Swimmer-v5, 5 seeds × 8 algos = 40 runs)
  # RTX 3050 Ti 4GB VRAM → max -P 4 (GPU bottleneck!)
  # ===========================================================================

  run-pilot:
    desc: "Pilot run: all 8 algorithms on Hopper-v5, 5 seeds each (40 runs). Tuned for RTX 3050 Ti 4GB VRAM."
    cmds:
      - |
        ENV="Hopper-v5"
        echo "=== Laptop Pilot: ${ENV} | 8 algos x 5 seeds = 40 runs | -P 3 (4GB VRAM) ==="
        (
          for seed in 0 1 2 3 4; do
            echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=dropout seed=$seed env.id=${ENV} eval_env.id=${ENV} n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_dropout_${ENV}_seed${seed}\" wandb.tags=\"[Pilot,sc_erl,dropout]\""
            echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=ensemble seed=$seed env.id=${ENV} eval_env.id=${ENV} n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_ensemble_${ENV}_seed${seed}\" wandb.tags=\"[Pilot,sc_erl,ensemble]\""
            echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=evidential seed=$seed env.id=${ENV} eval_env.id=${ENV} n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_evidential_${ENV}_seed${seed}\" wandb.tags=\"[Pilot,sc_erl,evidential]\""
            echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=random seed=$seed env.id=${ENV} eval_env.id=${ENV} n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_random_${ENV}_seed${seed}\" wandb.tags=\"[Pilot,sc_erl,random]\""
            echo "uv run python entry_point.py algorithm=td3 seed=$seed env.id=${ENV} eval_env.id=${ENV} n_steps=1000000 wandb.enabled=true wandb.name=\"td3_${ENV}_seed${seed}\" wandb.tags=\"[Pilot,td3,baseline]\""
            echo "uv run python entry_point.py algorithm=erl seed=$seed env.id=${ENV} eval_env.id=${ENV} n_steps=1000000 wandb.enabled=true wandb.name=\"erl_${ENV}_seed${seed}\" wandb.tags=\"[Pilot,erl,baseline]\""
            echo "uv run python entry_point.py algorithm=ddpg seed=$seed env.id=${ENV} eval_env.id=${ENV} n_steps=1000000 wandb.enabled=true wandb.name=\"ddpg_${ENV}_seed${seed}\" wandb.tags=\"[Pilot,ddpg,baseline]\""
            echo "uv run python entry_point.py algorithm=ppo seed=$seed env.id=${ENV} eval_env.id=${ENV} n_steps=1000000 wandb.enabled=true wandb.name=\"ppo_${ENV}_seed${seed}\" wandb.tags=\"[Pilot,ppo,baseline]\""
          done
        ) | perl -MList::Util=shuffle -e 'print shuffle <STDIN>' | xargs -I {} -P 4 bash -c '{}'
