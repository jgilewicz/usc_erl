# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: '3'

vars:
  ALGO: erl

tasks:
  default:
    desc: "List available tasks"
    cmds:
      - task --list
    silent: true

  run:
    desc: "Run algorithm (default: erl, e.g. task run ALGO=td3)"
    cmds:
      - uv run python entry_point.py algorithm={{.ALGO}} {{.CLI_ARGS}}

  tune:
    desc: "Tune hyperparameters using Optuna sequentially across all Fetch environments (default: erl, e.g. task tune ALGO=ppo)"
    cmds:
      - |
        for env in FetchReach-v4 FetchPush-v4 FetchSlide-v4 FetchPickAndPlace-v4; do
          echo "=== Tuning {{.ALGO}} on ${env} ==="
          uv run python src/optimization/optuna_tune.py algorithm={{.ALGO}} env.id=${env} eval_env.id=${env} {{.CLI_ARGS}}
        done

  tune-all:
    desc: "Tune hyperparameters across ALL 5 algorithms and ALL 4 Fetch environments sequentially (supports custom overrides, e.g. task tune-all CLI_ARGS=\"n_steps=10000\")"
    cmds:
      - uv run python src/optimization/run_optuna_grid.py {{.CLI_ARGS}}

  run-fetch-parallel:
    desc: "Runs the full Fetch experiment matrix locally in parallel"
    cmds:
      - |
        for env in FetchReach-v4 FetchPush-v4 FetchSlide-v4 FetchPickAndPlace-v4; do
          for seed in 0 1 2 3 4; do
            echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=dropout seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_dropout_${env}_seed${seed}\" wandb.tags=\"[Fetch,sc_erl,dropout]\""
            echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=ensemble seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_ensemble_${env}_seed${seed}\" wandb.tags=\"[Fetch,sc_erl,ensemble]\""
            echo "uv run python entry_point.py algorithm=td3 seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"td3_${env}_seed${seed}\" wandb.tags=\"[Fetch,td3,baseline]\""
            echo "uv run python entry_point.py algorithm=erl seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"erl_${env}_seed${seed}\" wandb.tags=\"[Fetch,erl,baseline]\""
            echo "uv run python entry_point.py algorithm=ppo seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"ppo_${env}_seed${seed}\" wandb.tags=\"[Fetch,ppo,baseline]\""
            echo "uv run python entry_point.py algorithm=sc_erl surrogate.mode=random seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"sc_erl_random_${env}_seed${seed}\" wandb.tags=\"[Fetch,sc_erl,random]\""
            echo "uv run python entry_point.py algorithm=ddpg seed=$seed env.id=$env eval_env.id=$env n_steps=1000000 wandb.enabled=true wandb.name=\"ddpg_${env}_seed${seed}\" wandb.tags=\"[Fetch,ddpg,baseline]\""
          done
        done | perl -MList::Util=shuffle -e 'print shuffle <STDIN>' | xargs -I {} -P 24 bash -c '{}'


  clean:
    desc: "Clean outputs, Hydra logs, training results, downloaded metrics, and compiled reports"
    cmds:
      - rm -rf outputs .hydra results wandb *.pdf 
      - |
        for folder in eval_reward rl_reward best_population_fitness avg_population_fitness uncertainty_mean uncertainty_max uncertainty_threshold critic_loss total_steps generation summary; do
          rm -rf plots_and_tests/$folder
        done

  report:
    desc: "Generate all plots, statistical tables, Markdown and PDF reports (full pipeline)"
    cmds:
      - uv run python plots_and_tests/process_results.py
      - uv run python plots_and_tests/statistical_tests.py
      - uv run python plots_and_tests/generate_report.py
      - uv run python plots_and_tests/generate_pdf.py

