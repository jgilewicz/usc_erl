# @package _global_
name: td3

buffer_size: 200_000
n_steps: 200_000
batch_size: 256

network:
  hidden_dim: 256

rl:
  gamma: 0.99
  tau: 0.005
  actor_lr: 0.0003
  critic_lr: 0.0003
  policy_noise: 0.2
  noise_clip: 0.5
  policy_delay: 2
  exploration_noise_std: 0.1

evaluation:
  evaluate_episodes: 10
  eval_interval: 5000

warmup:
  warmup_steps: 1000
