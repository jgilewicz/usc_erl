# @package _global_
name: ddpg

buffer_size: 200_000
n_steps: 1_000_000
batch_size: 256

network:
  actor_hidden_dim: 256
  critic_hidden_dim: 256

rl:
  gamma: 0.99
  tau: 0.005
  actor_lr: 3e-4
  critic_lr: 3e-4
  exploration_noise_std: 0.1

evaluation:
  evaluate_episodes: 5
  eval_interval: 5000

warmup:
  warmup_steps: 25000
