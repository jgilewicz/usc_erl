# @package _global_
name: ppo

n_steps: 1_000_000

buffer_size: 2048 
batch_size: 256 

rl:
  gamma: 0.99
  actor_lr: 3e-4
  critic_lr: 3e-4
  gae_lambda: 0.95
  clip_param: 0.2
  entropy_coef: 0.0
  ppo_epochs: 10

network:
  hidden_dim: 256

evaluation:
  evaluate_episodes: 5
  eval_interval: 5000
