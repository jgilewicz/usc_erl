# @package _global_
name: sc_erl

buffer_size: 200_000
n_steps: 1_000_000
batch_size: 256

network:
  actor_hidden_dim: 256
  critic_hidden_dim: 256

rl:
  gamma: 0.99
  tau: 0.005
  actor_lr: 3e-4
  critic_lr: 3e-4
  exploration_noise_std: 0.1
  gradient_steps: 1000

evolution:
  population_size: 10
  mutation_std: 0.1      
  mutation_prob: 0.9    
  elite_ratio: 0.2       
  rl_injection_interval: 1 


surrogate:
  enabled: true
  omega: 0.3
  k: 5
  k_ensembles: 5
  mode: dropout  # options: random, dropout, ensemble, evidential
  beta: 1.5
  dropout_p: 0.05
  mc_samples: 20
  min_uncertainty_floor: 0.01
  percentile: 75
  epsilon: 0.10
  lam: 0.1


warmup:
  warmup_steps: 10_000