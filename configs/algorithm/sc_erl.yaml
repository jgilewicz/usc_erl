# @package _global_
name: sc_erl
backbone: crossq  # "ddpg", "td3", or "crossq"
buffer_size: 1000000
n_steps: 1000000
batch_size: 256

network:
  actor_hidden_dim: 256
  critic_hidden_dim: 256

rl:
  gamma: 0.99
  tau: 0.005
  actor_lr: 3e-4
  critic_lr: 3e-4
  exploration_noise_std: 0.1
  gradient_steps: 1
  frac_frames_train: 1.0
  policy_delay: 1
  policy_noise: 0.206
  noise_clip: 0.562
  bn_momentum: 0.01  # CrossQ backbone only — BatchNorm momentum

evolution:
  population_size: 10
  mutation_std: 0.1
  mutation_prob: 0.9
  mutation_fraction: 0.1
  elite_ratio: 0.1
  rl_injection_interval: 10
  crossover_prob: 0.5
  crossover_mode: distillation
  eval_trials: 1

surrogate:
  enabled: true
  omega: 0.549
  k: 1024
  k_ensembles: 5
  mode: random
  beta: 0.432
  dropout_p: 0.387
  mc_samples: 25
  epsilon: 0.142
  lam: 0.1
  mad_k: 2.483
  beta_lr: 1e-3

warmup:
  warmup_steps: 10