# @package _global_
name: sc_erl

population_size: 10
buffer_size: 200_000
n_steps: 200_000
batch_size: 64

network:
  hidden_dim: 256

rl:
  gamma: 0.99
  tau: 0.005
  actor_lr: 0.001
  critic_lr: 0.001
  exploration_noise_std: 0.1
  gradient_steps: 50

evolution:
  mutation_std: 0.05
  mutation_prob: 0.1
  elite_ratio: 0.2
  rl_injection_interval: 10

surrogate:
  enabled: true
  omega: 0.3
  k: 5
  mode: dropout  # options: random, dropout, ensemble


warmup:
  warmup_steps: 1000